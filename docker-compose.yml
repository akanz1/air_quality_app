services:
  python_app:
    build: .
    command: python src/air_quality_app/streaming.py
    volumes:
      - .:/app
    privileged: true
    devices:
      - "/dev:/dev"
    depends_on:
      - influxdb

  influxdb:
    image: arm32v7/influxdb@sha256:5860a6f7fce49f8a6d7abb08246752f8f0b000a1b732817e9dc09ad998dfb521
    container_name: influxdb
    restart: always
    volumes:
      - influxdb-storage:/var/lib/influxdb
    environment:
    - INFLUXDB_ADMIN_USER=influxdb
    - INFLUXDB_ADMIN_PASSWORD=influxdb
    - INFLUXDB_REPORTING_DISABLED=true
    - DOCKER_INFLUXDB_INIT_RETENTION=52w
    ports:
      - "8086:8086"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_USER=grafana
      - GF_SECURITY_ADMIN_PASSWORD=grafana
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false

volumes:
  influxdb-storage:
  grafana-storage:
